version: '3.8'

# Supported models:
# - Intel/gemma-4-26B-A4B-it-int4-AutoRound
# - cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
services:
  gemma-4-26B-A4B-it:
    image: registry.quuxotic.net/vllm/vllm-openai:v0.22.1
    command: >-
      Intel/gemma-4-26B-A4B-it-int4-AutoRound
        --enable-auto-tool-choice
        --tool-call-parser gemma4
        --max-model-len 256K
        --served-model-name gemma-4-26B-A4B-it
        --load-format fastsafetensors
        --reasoning-parser gemma4
        --gpu-memory-utilization 0.52
        --kv-cache-memory-bytes 47721858845
        --kv-cache-dtype fp8
        --enable-prefix-caching
        --max-num-batched-tokens 8K
        --max-num-seqs 8
        --enable-chunked-prefill
        --moe-backend flashinfer_cutlass
    deploy:
      placement:
        constraints:
          - node.labels.role==primary
          - node.labels.type==gpu
      resources:
        reservations:
          memory: 62.1G
      restart_policy:
        condition: on-failure
    environment:
      HF_TOKEN:
      VLLM_MARLIN_USE_ATOMIC_ADD: 1
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - huggingface:/root/.cache/huggingface

volumes:
  huggingface:
