version: '3.8'

services:
  LFM2_5-350M:
    image: registry.quuxotic.net/vllm/vllm-openai:v0.22.1
    command: >-
      LiquidAI/LFM2.5-350M
        --enable-auto-tool-choice
        --tool-call-parser pythonic
        --max-model-len 32K
        --enforce-eager
        --served-model-name LFM2.5-350M
        --gpu-memory-utilization 0.05
        --kv-cache-memory-bytes 3579139414
        --max-num-batched-tokens 8K
        --max-num-seqs 8
        --enable-chunked-prefill
    deploy:
      placement:
        constraints:
          - node.labels.role==secondary
          - node.labels.type==gpu
      resources:
        reservations:
          memory: 5.2G
      restart_policy:
        condition: on-failure
    environment:
      HF_TOKEN:
      VLLM_MARLIN_USE_ATOMIC_ADD: 1
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - huggingface:/root/.cache/huggingface

volumes:
  huggingface:
