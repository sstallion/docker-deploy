version: '3.8'

services:
  Qwen3_5-0_8B:
    image: registry.quuxotic.net/vllm/vllm-openai:v0.22.1
    command: >-
      Qwen/Qwen3.5-0.8B
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --max-model-len 8K
        --served-model-name Qwen3.5-0.8B
        --load-format fastsafetensors
        --gpu-memory-utilization 0.06
        --language-model-only
        --max-num-batched-tokens 2K
        --max-num-seqs 8
        --enable-chunked-prefill
    deploy:
      placement:
        constraints:
          - node.labels.role==secondary
          - node.labels.type==gpu
      resources:
        reservations:
          memory: 8G
      restart_policy:
        condition: on-failure
    environment:
      HF_TOKEN:
      VLLM_MARLIN_USE_ATOMIC_ADD: 1
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - huggingface:/root/.cache/huggingface

volumes:
  huggingface:
